apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${APP_NAME}
  namespace: ${NAMESPACE}
  labels:
    app: todomanagement-api
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1

  selector:
    matchLabels:
      app: todomanagement-api

  template:
    metadata:
      labels:
        app: todomanagement-api
    spec:
      containers:
        - name: ${APP_NAME}
          image: ${IMAGE_PATH}
          imagePullPolicy: Always

          env:
            - name: ENV
              value: test

          ports:
            - containerPort: 8080
              
              protocol: TCP

          resources:
            requests:
              cpu: "0.05"
              memory: "50Mi"
            limits:
              cpu: "0.2"
              memory: "100Mi"

      imagePullSecrets:
        - name: retail-gitlab
