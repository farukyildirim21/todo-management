apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${APP_NAME}
  namespace: ${NAMESPACE}
  labels:
    app: todomanagement-api
spec:
  replicas: 1
  strategy:
    type: Recreate

  selector:
    matchLabels:
      app: todomanagement-api

  template:
    metadata:
      labels:
        app: todomanagement-api
    spec:
      containers:
        - name: ${APP_NAME}
          image: ${IMAGE_PATH}
          imagePullPolicy: Always

          env:
            - name: ASPNETCORE_URLS
              value: "http://0.0.0.0:8080"

          ports:
            - containerPort: 8080

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

      imagePullSecrets:
        - name: retail-gitlab
