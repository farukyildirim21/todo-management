stages:
  - build
  - deploy-test

variables:
    APP_NAME: 'todomanagement-api'
    ENV: 'test'
    NAMESPACE: 'todo-test'
    IMAGE_PATH: '$CI_REGISTRY_IMAGE/${APP_NAME}:${CI_PIPELINE_ID}'
    NODE_ENV: 'production'

    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
    VAULT_ADDRESS_QA: 'https://pass-portal-qa.hepsiburada.com'
    VAULT_ADDRESS_PROD: 'https://pass-portal.hepsiburada.com'


# -------------------------
# BUILD & PUSH IMAGE
# -------------------------
build-push:
  stage: build
  image: docker:27
  services:
    - name: docker:27.5.1-dind
      alias: docker
      command: ["--tls=false","--mtu=1410"]
       
  tags:
    - k8s
  before_script:
    - docker login --username "$DOCKERHUB_USERNAME" --password "$DOCKERHUB_PASSWORD"
    - echo -n "$CI_JOB_TOKEN" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - echo "DOCKER_HOST=$DOCKER_HOST"
    - docker info
    - cd backend
    - docker build --rm=true --no-cache --pull -f TodoManagement.Api/Dockerfile -t "$IMAGE_PATH" .
    - docker push "$IMAGE_PATH"
  retry:
    max: 2
    when: runner_system_failure
  timeout: 20 minutes

# -------------------------
# DEPLOY TO retail-hke-test
# -------------------------
deploy-test:
  stage: deploy-test
  extends: .deploy
  variables:
    ENV: "test"
    VAULT_CLUSTER: "retail-hke-test"
    CI_ENVIRONMENT_SLUG: "retail-hke-test"

# -------------------------
# DEPLOY TEMPLATE
# -------------------------
.deploy:
  image: devopshepsiburada/kubectl:1.25.0
  tags:
    - k8s
  before_script:
    - echo "Using cluster => $VAULT_CLUSTER"
    - kubectl config use-context $CI_PROJECT_ROOT_NAMESPACE/gitlab-agents:$VAULT_CLUSTER
  script:
    - kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

    - kubectl create secret docker-registry retail-gitlab \
      --docker-server="$CI_REGISTRY" \
      --docker-username="$DEPLOY_USERNAME" \
      --docker-password="$DEPLOY_PASSWORD" \
      -n "$NAMESPACE" || true

    - envsubst < backend/.k8s/mongo-deployment.yaml | kubectl apply -f -
    - envsubst < backend/.k8s/mongo-service.yaml | kubectl apply -f -

    - envsubst < backend/.k8s/redis-deployment.yaml | kubectl apply -f -
    - envsubst < backend/.k8s/redis-service.yaml | kubectl apply -f -

    - envsubst < backend/.k8s/deployment.yaml | kubectl apply -f -
    - envsubst < backend/.k8s/service.yaml | kubectl apply -f -

    - kubectl rollout status deployment/$APP_NAME -n "$NAMESPACE" --timeout=180s

  after_script:
    - kubectl config use-context $CI_PROJECT_ROOT_NAMESPACE/gitlab-agents:$VAULT_CLUSTER
  allow_failure: false
  timeout: 10 minutes
