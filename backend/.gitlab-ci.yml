stages:
  - build
  - deploy-test

variables:
    APP_NAME: 'todomanagement-api'
    ENV: 'test'
    NAMESPACE: 'todo-test'
    IMAGE_PATH: '$CI_REGISTRY_IMAGE/${APP_NAME}:${CI_PIPELINE_ID}'
    NODE_ENV: 'production'

    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
    VAULT_ADDRESS_QA: 'https://pass-portal-qa.hepsiburada.com'
    VAULT_ADDRESS_PROD: 'https://pass-portal.hepsiburada.com'


# -------------------------
# BUILD & PUSH IMAGE
# -------------------------
build-push:
  stage: build
  image: docker:27
  services:
    - name: docker:27.5.1-dind
      alias: docker
      command: ["--tls=false","--mtu=1410"]
       
  tags:
    - k8s
  before_script:
    - docker login --username "$DOCKERHUB_USERNAME" --password "$DOCKERHUB_PASSWORD"
    - echo -n "$CI_JOB_TOKEN" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - echo "DOCKER_HOST=$DOCKER_HOST"
    - docker info
    - cd backend
    - docker build --rm=true --no-cache --pull -f TodoManagement.Api/Dockerfile -t "$IMAGE_PATH" .
    - docker push "$IMAGE_PATH"
  retry:
    max: 2
    when: runner_system_failure
  timeout: 20 minutes

# -------------------------
# DEPLOY TO retail-hke-test
# -------------------------
deploy-test:
  stage: deploy-test
  extends: .deploy
  variables:
    ENV: "test"
    VAULT_CLUSTER: "retail-hke-test"
    CI_ENVIRONMENT_SLUG: "retail-hke-test"

# -------------------------
# DEPLOY TEMPLATE
# -------------------------
.deploy:
  image: devopshepsiburada/kubectl:1.25.0
  tags:
    - k8s
  before_script:
    - echo "Using cluster => $VAULT_CLUSTER"
    - kubectl config use-context $CI_PROJECT_ROOT_NAMESPACE/gitlab-agents:$VAULT_CLUSTER
  script:
    # Namespace (idempotent)
    - kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

    # Registry secret
    - kubectl create secret docker-registry retail-gitlab --docker-server="$CI_REGISTRY" --docker-username="$DEPLOY_USERNAME" --docker-password="$DEPLOY_PASSWORD" -n "$NAMESPACE" || echo "secret already exists"
    
    - kubectl delete pod -n "$NAMESPACE" -l app=todomanagement-api --force --grace-period=0 || true

    # Apply manifests
    - cat backend/.k8s/deployment.yaml | envsubst | kubectl apply -f -
    - if [ -f "backend/.k8s/service.yaml" ]; then
      cat backend/.k8s/service.yaml | envsubst | kubectl apply -f -;
      else
      echo "service.yaml not found";
      fi
    
    # -------------------------
    # ✅ VERIFY / HEALTH CHECK
    # -------------------------
    - echo "🧾 Rendered manifest (deployment):"
    - envsubst < backend/.k8s/deployment.yaml | sed -n '1,200p'

    - echo "📌 IMAGE_PATH=$IMAGE_PATH"
    - echo "📌 APP_NAME=$APP_NAME"
    - echo "📌 NAMESPACE=$NAMESPACE"

    - echo "🧱 ReplicaSets:"
    - kubectl get rs -n "$NAMESPACE" -o wide

    - echo "🧱 Describe Deployment:"
    - kubectl describe deployment "$APP_NAME" -n "$NAMESPACE" | tail -n 120

    - echo "🧨 Events (son 50):"
    - kubectl get events -n "$NAMESPACE" --sort-by=.lastTimestamp | tail -n 50

    - echo "📦 Pods:"
    - kubectl get pods -n "$NAMESPACE" -o wide

    - echo "📦 Namespace kontrol:"
    - kubectl get ns |  grep "$NAMESPACE"

    - echo "🚀 Deployment durumu:"
    - kubectl get deployment -n "$NAMESPACE"

    - echo "⏳ Pod Ready olmasını bekliyoruz..."
    - echo "📦 Pods (watch 30s):"
    - kubectl get pods -n "$NAMESPACE" -l app=$APP_NAME -w --request-timeout=30s || true

    - echo "📦 Pods (final):"
    - kubectl get pods -n "$NAMESPACE" -l app=$APP_NAME -o wide || true

    - echo "🧠 Describe (newest pod):"
    - POD=$(kubectl get pods -n "$NAMESPACE" -l app=$APP_NAME --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[-1:].metadata.name}')
    - echo "POD=$POD"
    - kubectl describe pod -n "$NAMESPACE" "$POD" | tail -n 200 || true

    - echo "📜 Logs (current + previous):"
    - kubectl logs -n "$NAMESPACE" "$POD" --tail=200 || true
    - kubectl logs -n "$NAMESPACE" "$POD" --previous --tail=200 || true

    - kubectl rollout status deployment/$APP_NAME -n "$NAMESPACE" --timeout=120s

    - echo "📦 Pod listesi:"
    - kubectl get pods -n "$NAMESPACE" -o wide

    - echo "🧠 Pod detay (ilk pod):"
    - kubectl describe pod -n "$NAMESPACE" -l app=$APP_NAME | tail -n 120

    - echo "📜 Application logları:"
    - kubectl logs -n "$NAMESPACE" -l app=$APP_NAME --tail=200
  after_script:
    - kubectl config use-context $CI_PROJECT_ROOT_NAMESPACE/gitlab-agents:$VAULT_CLUSTER
  allow_failure: false
  timeout: 10 minutes
