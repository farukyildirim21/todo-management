variables:
  GATEWAY_NAME: "krakend"
  NAMESPACE: "todo-test"
  GATEWAY_IMAGE: "$CI_REGISTRY_IMAGE/${GATEWAY_NAME}:${CI_PIPELINE_ID}"

# -------------------------
# BUILD GATEWAY
# -------------------------
build-gateway:
  image: docker:27
  stage: build
  services:
    - name: docker:27.5.1-dind
      alias: docker
      command: ["--tls=false","--mtu=1410"]

  variables:
    DOCKER_HOST: "tcp://docker:2375"
    DOCKER_TLS_CERTDIR: ""

  tags:
    - k8s

  before_script:
    - echo -n "$CI_JOB_TOKEN" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"

  script:
    - docker info
    - cd gateway
    - docker build -t "$GATEWAY_IMAGE" .
    - docker push "$GATEWAY_IMAGE"

  timeout: 20 minutes

# -------------------------
# DEPLOY GATEWAY
# -------------------------
deploy-gateway:
  stage: deploy-gateway
  image: devopshepsiburada/kubectl:1.25.0
  tags:
    - k8s

  before_script:
    - kubectl config use-context $CI_PROJECT_ROOT_NAMESPACE/gitlab-agents:retail-hke-test

  script:
    - kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

    - kubectl get secret retail-gitlab -n "$NAMESPACE" >/dev/null 2>&1 || kubectl create secret docker-registry retail-gitlab --docker-server="$CI_REGISTRY" --docker-username="$DEPLOY_USERNAME" --docker-password="$DEPLOY_PASSWORD" -n "$NAMESPACE"

    - envsubst < gateway/.k8s/krakend-config.yaml | kubectl apply -f -
    - envsubst < gateway/.k8s/deployment.yaml | kubectl apply -f -
    - envsubst < gateway/.k8s/service.yaml | kubectl apply -f -

  

    - echo "📦 Gateway Pods:"
    - kubectl get pods -n "$NAMESPACE"

    - echo "📜 Gateway Logs:"
    - kubectl logs -n "$NAMESPACE" -l app=$GATEWAY_NAME --tail=100

  timeout: 20 minutes
